<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0;url=00-5500总览.html">
<title>母语感觉词汇库知识库</title>
<style>/* === Reset & Base === */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  line-height: 1.7;
  color: #333;
  background: #f8f9fa;
}

/* === Sidebar === */
.sidebar {
  position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
  background: #1a3a4a; color: #ccc; overflow-y: auto; z-index: 100;
  padding-bottom: 80px;
  transition: transform 0.3s;
}
.sidebar-header {
  padding: 16px; background: #0f2837; font-size: 1.1em; font-weight: bold;
  position: sticky; top: 0; z-index: 1;
}
.sidebar nav { padding: 0 8px; }
.sidebar ul { list-style: none; padding-left: 0; }
.sidebar li { margin: 0; padding: 2px 0; }
.sidebar li a {
  color: #b0c8d8; text-decoration: none; display: block; padding: 4px 8px;
  border-radius: 4px; font-size: 0.9em;
}
.sidebar li a:hover { background: #2a5068; color: #fff; }
.sidebar li.toc-file a.active { color: #fff; background: #2d6a9f; font-weight: bold; }

.toc-dirname { color: #8cbfe0; font-weight: bold; font-size: 0.85em; }
.toc-toggle { cursor: pointer; font-size: 1.1em; user-select: none; color: #6a9; }
.toc-file a { padding-left: 8px !important; }

/* Search */
.search-box { padding: 8px 12px; position: sticky; top: 56px; background: #1a3a4a; z-index: 1; }
.search-box input {
  width: 100%; padding: 8px 10px; border: none; border-radius: 6px;
  background: #0f2837; color: #ddd; font-size: 0.9em; outline: none;
}
.search-box input:focus { background: #0a1f2e; }
#search-results {
  display: none; margin-top: 4px; background: #0f2837; border-radius: 6px;
  max-height: 200px; overflow-y: auto;
}
#search-results a {
  display: block; padding: 6px 10px; color: #b0c8d8; text-decoration: none; font-size: 0.85em;
  border-bottom: 1px solid #1a3a4a;
}
#search-results a:last-child { border-bottom: none; }
#search-results a:hover { background: #2a5068; color: #fff; }

/* === Content === */
.content {
  margin-left: 280px; max-width: 820px; padding: 24px 32px 64px;
}
.breadcrumb { font-size: 0.85em; color: #888; margin-bottom: 16px; }

/* Article styles */
article h1 { font-size: 1.8em; color: #1a3a4a; margin: 0 0 8px; border-bottom: 3px solid #2d6a9f; padding-bottom: 8px; }
article h2 { font-size: 1.3em; color: #2d6a9f; margin: 28px 0 12px; padding-left: 8px; border-left: 4px solid #2d6a9f; }
article h3 { font-size: 1.1em; color: #444; margin: 20px 0 8px; }
article p { margin: 8px 0; }
article blockquote {
  border-left: 4px solid #b0c8d8; padding: 8px 16px; margin: 12px 0;
  background: #eef3f7; border-radius: 0 6px 6px 0; color: #4a6578;
}
article table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.9em; }
article th, article td { border: 1px solid #dde; padding: 8px 12px; text-align: left; }
article th { background: #e8f0f6; font-weight: bold; color: #1a3a4a; }
article tr:nth-child(even) { background: #f6f9fb; }
article code {
  background: #edf2f7; padding: 2px 6px; border-radius: 4px;
  font-family: "SF Mono", Consolas, monospace; font-size: 0.9em;
}
article pre { background: #1e2a34; color: #cdd; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; }
article pre code { background: none; padding: 0; color: inherit; }

article ul, article ol { margin: 8px 0 8px 20px; }
article li { margin: 3px 0; }
article hr { margin: 32px 0 16px; border: none; border-top: 1px solid #dde; }

/* Wiki links */
a.wiki-link { color: #2d6a9f; text-decoration: none; border-bottom: 1px dashed #8cbfe0; }
a.wiki-link:hover { color: #1a4a7f; border-bottom-color: #2d6a9f; }
span.broken-link { color: #c44; text-decoration: line-through; }

/* Footer */
footer { margin-top: 40px; color: #999; font-size: 0.85em; }

/* Menu toggle (mobile) */
.menu-toggle {
  display: none; position: fixed; top: 12px; left: 12px; z-index: 200;
  background: #1a3a4a; color: #fff; border: none; padding: 8px 14px;
  border-radius: 6px; font-size: 1.2em; cursor: pointer;
}
.overlay { display: none; }

/* === Mobile === */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open {
    transform: translateX(0);
  }
  .overlay.show {
    display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); z-index: 99;
  }
  .content { margin-left: 0; padding: 16px; }
  .menu-toggle { display: block; }
  article h1 { font-size: 1.4em; }
  article h2 { font-size: 1.15em; }
  article table { font-size: 0.8em; }
  article th, article td { padding: 4px 6px; }
}
</style>
</head>

</div>
</body>
</html>
